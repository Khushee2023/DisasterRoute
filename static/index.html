<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DisasterRoute — Evacuation Optimizer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <div id="sidebar">
            <div id="header">
                <h1>🚨 DisasterRoute</h1>
                <p>Real-Time Evacuation Optimizer</p>
            </div>

            <!-- Scenario Setup -->
            <div class="section">
                <h2>Scenario Setup</h2>
                <input type="text" id="scenario-name" placeholder="Scenario name e.g. Cyclone Fani"/>
                <input type="text" id="city-name" placeholder="City e.g. Bhubaneswar, Odisha, India"/>
            </div>

            <!-- Shelters -->
            <div class="section">
                <h2>Shelters</h2>
                <div id="shelters-list"></div>
                <button onclick="addShelter()">+ Add Shelter</button>
            </div>

            <!-- Danger Zones -->
            <div class="section">
                <h2>Danger Zones</h2>
                <div id="dangerzones-list"></div>
                <button onclick="addDangerZone()">+ Add Danger Zone</button>
            </div>

            <!-- Algorithm -->
            <div class="section">
                <h2>Algorithm</h2>
                <select id="algorithm">
                    <option value="astar">A* (Recommended)</option>
                    <option value="dijkstra">Dijkstra's</option>
                </select>
            </div>

            <!-- Actions -->
            <div class="section">
                <button id="create-btn" class="primary" onclick="createScenario()">
                    Create Scenario & Load Map
                </button>
                <button id="evacuate-btn" class="success" onclick="runEvacuation()" disabled>
                    Run Evacuation
                </button>
            </div>

            <!-- Status -->
            <div id="status-box">
                <p id="status-text">Ready.</p>
            </div>

            <!-- Results -->
            <div id="results" style="display:none">
                <h2>Results</h2>
                <div id="results-content"></div>
            </div>
        </div>

        <!-- Map -->
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/js/map.js"></script>
</body>
</html>
